version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Frontend — Next.js 14
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - orivanta-network

  # ---------------------------------------------------------------------------
  # Backend — FastAPI
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - orivanta-network

  # ---------------------------------------------------------------------------
  # PostgreSQL 15 + pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orivanta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orivanta_dev}
      POSTGRES_DB: ${POSTGRES_DB:-orivanta_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orivanta"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orivanta-network

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orivanta-network

volumes:
  postgres_data:
  redis_data:

networks:
  orivanta-network:
    driver: bridge
